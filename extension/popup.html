<!DOCTYPE html>
<html>
<head>
    <title>Color Changer</title>
    <style>
        body {
            min-width: 200px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 8px 16px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <button id="changeColorBtn">Сделать фон небесным ☁️</button>
    <script src="popup.js"></script>
</body>
</html>
