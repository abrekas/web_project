<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Настройки расширения</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      min-width: 300px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    #status {
      margin-top: 16px;
      color: #2c3e50;
      font-size: 14px;
    }
    .success {
      color: #27ae60;
    }
    .error {
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <h2>Выбор папки для заметок</h2>
  <p>Все заметки будут сохраняться в файл <strong>notes.json</strong> внутри выбранной папки.</p>
  <button id="selectFolderBtn">📁 Выбрать папку</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
