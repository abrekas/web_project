<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Highliter.com</title>
    <link rel="stylesheet" href="styles/notes.css" />
    <link rel="icon" href="media/logo.png" type="image/png" />
    <style>
      .startup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .startup-overlay.show {
        display: flex;
      }
      .startup-box {
        width: min(520px, calc(100vw - 32px));
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        font-family: system-ui, sans-serif;
      }
      .startup-box h2 {
        margin: 0 0 12px;
      }
      .startup-box p {
        margin: 0 0 16px;
        line-height: 1.45;
      }
      .startup-actions {
        display: flex;
        gap: 12px;
      }
      .startup-actions button {
        padding: 10px 16px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
      }
      .primary-btn {
        background: #111;
        color: white;
      }
      .secondary-btn {
        background: #eee;
      }
      #startup-error {
        color: #c00;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-body">
          <div class="logo">Highliter.com</div>

          <div id="folder-icon" class="folder-icon">
            <img src="media/Folder plus.png" />
          </div>

          <nav class="categories">
            <ul id="categories-ul"></ul>

            <template id="category-item-template">
              <li>
                <span></span>
                <button class="delete-category" title="Удалить категорию">
                  <img src="media/remove.png" alt="remove" />
                </button>
              </li>
            </template>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div id="color-btn" class="gradient-circle"></div>
          <button id="about-btn" class="about-btn">О сайте</button>
        </div>
      </aside>

      <main class="content-area">
        <header class="content-header">
          <div id="search-btn" class="search-bar">
            <input
              id="search-input"
              class="search-bar-input"
              type="text"
              placeholder="поиск"
            />
            <img class="search-icon" src="media/search_icon.png" />
          </div>
          <nav class="view-switch">
            <button class="active">все</button>
            <button>картинки</button>
            <button>текст</button>
          </nav>
        </header>

        <section id="cards-list" class="cards-list"></section>
      </main>
    </div>

    <div id="universal-modal" class="modal-overlay">
      <div class="modal-content">
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Стартовый запрос доступа -->
    <div id="startup-overlay" class="startup-overlay">
      <div class="startup-box">
        <h2>Разрешите доступ к папке с данными</h2>
        <p>
          Сайт хранит ваши заметки и категории в выбранной вами папке. Будут
          использоваться файлы <b>notes.json</b> и <b>categories.json</b>.
        </p>
        <div class="startup-actions">
          <button id="grant-access-btn" class="primary-btn">
            Разрешить доступ
          </button>
          <button id="startup-cancel-btn" class="secondary-btn">Позже</button>
        </div>
        <div id="startup-error"></div>
      </div>
    </div>

    <script src="js/modal.js"></script>
    <script src="js/fs-storage.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/themes.js"></script>
  </body>
</html>
